name: SitePilot familiarize.com
run-name: >-
  SitePilot ${{ inputs.mode }} ${{ inputs.section }} by @${{ github.actor }}

on:
  schedule:
    # Daily at 02:00 UTC (07:00 Asia/Karachi). Scheduled runs go live with the lean brain.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      brain:
        description: "Brain"
        type: choice
        options: [lean, cycle]
        default: lean
        required: true
      mode:
        description: "Run mode"
        type: choice
        options: [dry, live]
        default: dry
        required: true
      section:
        description: "Site section"
        type: choice
        options: [docs, www, about]
        default: docs
        required: true
      sitepilot_ref:
        description: "SitePilot branch/tag/SHA"
        type: string
        default: main
        required: true
      content_ref:
        description: "familiarize.com branch/tag/SHA"
        type: string
        default: main
        required: true
      rebuild_semantic_index:
        description: "Rebuild semantic index before cycle"
        type: boolean
        default: false
        required: true

permissions:
  contents: read
  actions: read

jobs:
  sitepilot:
    name: SitePilot ${{ inputs.section }} ${{ inputs.mode }}
    runs-on: ubuntu-latest
    timeout-minutes: 240

    concurrency:
      group: sitepilot-${{ inputs.section }}-${{ inputs.mode }}
      cancel-in-progress: false

    env:
      # Scheduled (cron) runs have empty inputs -> default to a live lean docs run.
      SECTION: ${{ inputs.section || 'docs' }}
      MODE: ${{ inputs.mode || 'live' }}
      BRAIN: ${{ inputs.brain || 'lean' }}
      PROFILE: sitepilot/profiles/familiarize.yaml
      CONTENT_REPO_PATH: content
      WORKFLOWS_REPO_PATH: workflows
      REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
      CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.CUSTOM_SEARCH_ENGINE_ID }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
      PROFESSIONALIZE_BASE_URL: ${{ secrets.PROFESSIONALIZE_BASE_URL }}
      PROFESSIONALIZE_LLM_MODEL: ${{ secrets.PROFESSIONALIZE_LLM_MODEL }}
      PROFESSIONALIZE_EMBEDDING_MODEL: ${{ secrets.PROFESSIONALIZE_EMBEDDING_MODEL }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
      GOOGLE_ADS_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_ADS_OAUTH_CLIENT_ID }}
      GOOGLE_ADS_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_OAUTH_CLIENT_SECRET }}
      GOOGLE_ADS_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_OAUTH_REFRESH_TOKEN }}

    steps:
      - name: Checkout workflows repo
        uses: actions/checkout@v4
        with:
          repository: familiarizeptyltd/familiarize.com-workflows
          token: ${{ secrets.REPO_TOKEN }}
          ref: main
          path: workflows
          fetch-depth: 0

      - name: Checkout SitePilot
        uses: actions/checkout@v4
        with:
          repository: familiarizeptyltd/SitePilot
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.sitepilot_ref || 'main' }}
          path: sitepilot
          fetch-depth: 0

      - name: Checkout familiarize.com
        uses: actions/checkout@v4
        with:
          repository: familiarizeptyltd/familiarize.com
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.content_ref || 'main' }}
          path: content
          fetch-depth: 0
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SitePilot
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e sitepilot

      - name: Restore SitePilot runtime state
        uses: actions/cache/restore@v4
        with:
          path: .sitepilot
          key: sitepilot-runtime-${{ runner.os }}-${{ env.SECTION }}-${{ github.run_id }}
          restore-keys: |
            sitepilot-runtime-${{ runner.os }}-${{ env.SECTION }}-

      - name: Verify required SitePilot secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            REPO_TOKEN \
            GOOGLE_CREDENTIALS_JSON \
            PROFESSIONALIZE_API_KEY \
            PROFESSIONALIZE_BASE_URL \
            PROFESSIONALIZE_LLM_MODEL \
            PROFESSIONALIZE_EMBEDDING_MODEL
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            printf 'Missing required SitePilot secrets/env values:\n' >&2
            printf -- '- %s\n' "${missing[@]}" >&2
            exit 2
          fi

      - name: Validate SitePilot profile
        shell: bash
        run: |
          set -euo pipefail
          python -m sitepilot validate --profile "$PROFILE"

      - name: Rebuild semantic index
        if: inputs.rebuild_semantic_index
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python -m sitepilot semantic-index \
            --profile "$PROFILE" \
            --section "$SECTION" \
            --content-repo-path "$CONTENT_REPO_PATH" \
            --workflows-repo-path "$WORKFLOWS_REPO_PATH" \
            --rebuild \
            --output artifacts/semantic-index.json

      - name: Run SitePilot (lean brain)
        if: env.BRAIN == 'lean'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Full engine: meta (ctr_rewrite) + body (freshness_refresh) + FAQ (faq_repair)
          # auto-merge (self-reviewed, fail-closed). --enable-research turns on
          # researched_expansion (web research + references), which opens HUMAN-REVIEW
          # PRs (never auto-publishes web-sourced claims). NEW pages open in SHADOW mode
          # (would-automerge verdict recorded, human-reviewed). Scale --max-improve-prs
          # as quality is proven; swap --shadow-new-pages for --auto-merge-new-pages later.
          MODE_FLAGS="--dry-run"
          if [[ "$MODE" == "live" ]]; then
            MODE_FLAGS="--live --auto-merge-low-risk --enable-research --shadow-new-pages"
          fi
          python -m sitepilot lean-cycle \
            --profile "$PROFILE" \
            --section "$SECTION" \
            --content-repo-path "$CONTENT_REPO_PATH" \
            --workflows-repo-path "$WORKFLOWS_REPO_PATH" \
            --max-improve-prs 25 \
            --max-new-topic-prs 2 \
            --cooldown-days 14 \
            $MODE_FLAGS \
            --output "artifacts/sitepilot-${SECTION}-${MODE}.json"

      - name: Run SitePilot (legacy cycle)
        if: env.BRAIN == 'cycle'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          MODE_FLAG="--dry-run"
          if [[ "$MODE" == "live" ]]; then
            MODE_FLAG="--live"
          fi
          python -m sitepilot cycle \
            --profile "$PROFILE" \
            --section "$SECTION" \
            --content-repo-path "$CONTENT_REPO_PATH" \
            --workflows-repo-path "$WORKFLOWS_REPO_PATH" \
            "$MODE_FLAG" \
            --output "artifacts/sitepilot-${SECTION}-${MODE}.json"

      - name: Summarize lean report
        if: always() && env.BRAIN == 'lean'
        shell: bash
        run: |
          set -euo pipefail
          REPORT="artifacts/sitepilot-${SECTION}-${MODE}.json"
          if [[ ! -f "$REPORT" ]]; then
            echo "No lean report found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python - "$REPORT" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, sys
          from collections import Counter
          r = json.load(open(sys.argv[1], encoding="utf-8"))
          outcomes = r.get("outcomes", [])
          status = Counter(o.get("status", "") for o in outcomes)
          print("## SitePilot Lean Summary")
          print(f"- Dry run: {r.get('dry_run')}")
          print(f"- Snapshot: {', '.join(r.get('snapshot_statuses', []))}")
          print(f"- Opportunities: {r.get('opportunities_found')} | improve candidates: {r.get('improve_candidates')} | new-topic candidates: {r.get('new_topic_candidates')}")
          print(f"- Outcomes: `{dict(status)}`")
          prs = [o for o in outcomes if o.get("status") == "pr_opened"]
          if prs:
              print("### PRs opened")
              for o in prs:
                  print(f"- [{o.get('action_type')}] {o.get('title')} -> {o.get('pr_url')}")
          rej = [o for o in outcomes if str(o.get("status")) == "skipped" and str(o.get("reason", "")).startswith("self_review")]
          if rej:
              print("### Self-review rejected")
              for o in rej:
                  print(f"- {o.get('title')}: {o.get('reason')}")
          PY

      - name: Summarize SitePilot report
        if: always() && env.BRAIN == 'cycle'
        shell: bash
        run: |
          set -euo pipefail
          REPORT="artifacts/sitepilot-${SECTION}-${MODE}.json"
          if [[ ! -f "$REPORT" ]]; then
            echo "No SitePilot report found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python - "$REPORT" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, sys
          from collections import Counter
          report = json.load(open(sys.argv[1], encoding="utf-8"))
          actions = report.get("actions", [])
          content_actions = [
              item for item in actions
              if item.get("kind") in {"content_update", "content_create", "content_folder_create"}
          ]
          statuses = Counter(item.get("status", "") for item in actions)
          content_statuses = Counter(item.get("status", "") for item in content_actions)
          kinds = Counter(item.get("kind", "") for item in actions)
          execution_summary = report.get("execution_summary", {})
          content_execution = execution_summary.get("content_execution", {}) or report.get("content_execution_metrics", {})
          prs = [
              item.get("metadata", {}).get("pull_request", {})
              for item in actions
              if isinstance(item.get("metadata", {}).get("pull_request", {}), dict)
          ]
          prs = [item for item in prs if item.get("url")]
          print("## SitePilot Summary")
          print(f"- Opportunities: {len(report.get('opportunities', []))}")
          print(f"- Actionable opportunities: {len(report.get('actionable_opportunities', []))}")
          print(f"- Actions: {len(actions)}")
          print(f"- Content actions: {len(content_actions)}")
          print(f"- Accepted content actions: {content_execution.get('accepted_content_actions', content_execution.get('accepted_files', 0))}")
          print(f"- LLM drafts used: {content_execution.get('llm_drafts_used', 0)}")
          print(f"- Repaired files: {content_execution.get('post_draft_repairs', 0)}")
          print(f"- Pre-LLM skips: `{content_execution.get('pre_llm_skips', {})}`")
          print(f"- Post-draft hard rejections: `{content_execution.get('post_draft_hard_rejections', {})}`")
          print(f"- Failures: {len(report.get('failures', []))}")
          print(f"- Statuses: `{dict(statuses)}`")
          print(f"- Content statuses: `{dict(content_statuses)}`")
          print(f"- Kinds: `{dict(kinds)}`")
          for pr in prs:
              print(f"- Pull request: {pr.get('url')}")
          PY

      # Measure whether merged changes actually helped, from the snapshot this run already
      # collected (no extra GSC/GA4 quota). Pins baselines for newly-merged PRs (English
      # content + locale-optimize) and reads verdicts at the 30-day horizon; the ledger lives
      # in .sitepilot so it rides the runtime-state cache below. Observational only:
      # continue-on-error so it can never break the content pipeline.
      - name: Measure impact (regression guard + per-action-type precision)
        if: always() && env.BRAIN == 'lean'
        shell: bash
        continue-on-error: true
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -uo pipefail
          SNAP="$(ls -t .sitepilot/snapshot-${SECTION}-*.pkl 2>/dev/null | head -1 || true)"
          [ -z "$SNAP" ] && SNAP="$(ls -t .sitepilot/snapshot-*.pkl 2>/dev/null | head -1 || true)"
          if [ -z "$SNAP" ]; then echo "no snapshot found; skipping impact measurement"; exit 0; fi
          echo "Measuring impact from ${SNAP}"
          python -m sitepilot impact \
            --profile "$PROFILE" \
            --section "$SECTION" \
            --snapshot "$SNAP" \
            --content-repo-path "$CONTENT_REPO_PATH" \
            --output "artifacts/impact-${SECTION}.json" \
            || echo "impact step soft-failed (non-fatal, observational only)"

      - name: Upload SitePilot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitepilot-${{ inputs.section }}-${{ inputs.mode }}-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn

      - name: Save SitePilot runtime state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .sitepilot
          key: sitepilot-runtime-${{ runner.os }}-${{ env.SECTION }}-${{ github.run_id }}

      # Daily lean->locale handoff: ~99% of improvement demand is locale (measured), and
      # the demand-routing diverts it to locale-optimize. Dispatch locale-optimize to REUSE
      # the snapshot this run just cached (no second GSC collect), so locale demand is served
      # daily. Review-mode PR (auto-merge after a clean week). Only after a successful live
      # lean docs run; uses REPO_TOKEN so the workflow's own permissions need not widen.
      - name: Hand off to locale-optimize (reuse today's snapshot)
        if: ${{ success() && env.BRAIN == 'lean' && env.MODE == 'live' && env.SECTION == 'docs' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          gh api -X POST \
            "repos/familiarizeptyltd/familiarize.com-workflows/actions/workflows/sitepilot-locale-optimize.yml/dispatches" \
            -f ref=main \
            -f "inputs[site]=${SECTION}" \
            -f "inputs[reuse_snapshot]=true"
          echo "Dispatched locale-optimize (reuse_snapshot) for ${SECTION}."
