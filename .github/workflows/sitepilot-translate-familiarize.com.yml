name: SitePilot Translate familiarize.com
run-name: SitePilot translate ${{ github.event.inputs.site }} (${{ github.event.inputs.languages }}, ${{ github.event.inputs.mode }})

# SitePilot-owned translation (replaces the C# websiteManager translate workflow).
# Reuses the existing translation memory and translates only new/changed strings.
#
# DORMANT until go-live: workflow_dispatch-only. Two modes:
#   review (default) -> commit locale changes to a branch + open a PR; NO deploy.
#   live             -> commit to main, persist TM, then reliable deploy.
# Start with mode=review, languages=ja to validate the first run as a PR.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: environment
        default: production
        required: true
      site:
        description: "Which site to translate"
        type: choice
        options: [www, docs, about]
        default: docs
        required: true
      languages:
        description: "Locales to translate (comma list, or 'all')"
        type: string
        default: "ja"
        required: false
      exclude_languages:
        description: "Locales to skip (zero-traffic). hi = Hindi (1 impr / 0 clicks per 28d)."
        type: string
        default: "hi"
        required: false
      mode:
        description: "review = open a PR, no deploy | live = commit to main + deploy"
        type: choice
        options: [review, live]
        default: review
        required: true
      fill_untranslated_only:
        description: "Minimal churn: fix only untranslated content, keep existing translations"
        type: boolean
        default: true
        required: false
      changed_only:
        description: "Ongoing: translate only the English pages the triggering merge changed (full mode so edits propagate)"
        type: boolean
        default: false
        required: false
      changed_base:
        description: "changed_only range: git ref to diff HEAD against (default HEAD~1). Set e.g. HEAD~3 to cover a burst of merges."
        type: string
        default: ""
        required: false
      changed_pages:
        description: "changed_only override: explicit newline/comma list of English .md page paths (repo-relative) to translate. Recovers a commit that concurrency-coalescing cancelled. Takes precedence over changed_base."
        type: string
        default: ""
        required: false
      translate_i18n:
        description: "Also translate the theme i18n strings (themes/docs-theme/i18n/en.yaml -> locale yamls)"
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  translate:
    name: SitePilot translate ${{ inputs.site }} (${{ inputs.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: ${{ inputs.environment }}

    outputs:
      deploy_needed: ${{ steps.commit.outputs.deploy_needed }}

    env:
      SITE: ${{ inputs.site }}
      WEBSITE: ${{ inputs.site }}.familiarize.com
      LANGS: ${{ inputs.languages }}
      DISABLED_LOCALES: ${{ inputs.exclude_languages }}
      MODE: ${{ inputs.mode }}
      # Per-site git tag marking the content SHA up to which English pages are translated.
      # Advanced only after a successful default-range translate+push (see below), so a
      # coalescing-cancelled run never advances it and the next run diffs from the last SUCCESS.
      MARKER: sitepilot-translated-${{ inputs.site }}

    concurrency:
      group: sitepilot-translate-${{ inputs.environment }}-${{ inputs.site }}
      cancel-in-progress: true

    steps:
      - name: Checkout familiarize.com (content)
        uses: actions/checkout@v4
        with:
          repository: familiarizeptyltd/familiarize.com
          token: ${{ secrets.REPO_TOKEN }}
          ref: main
          path: hugo_content
          fetch-depth: 0
          submodules: true

      - name: Checkout websiteManager (translation memory)
        uses: actions/checkout@v4
        with:
          repository: salmansarfraz/websiteManager
          token: ${{ secrets.WEBSITE_MANAGER_REPO_TOKEN }}
          ref: master
          path: website_manager
          fetch-depth: 0

      - name: Checkout SitePilot
        uses: actions/checkout@v4
        with:
          repository: familiarizeptyltd/SitePilot
          token: ${{ secrets.REPO_TOKEN }}
          ref: main
          path: sitepilot

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SitePilot
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ./sitepilot

      - name: Translate (reuse TM, fill untranslated, glossary-aware)
        shell: bash
        env:
          PROFESSIONALIZE_BASE_URL: ${{ secrets.PROFESSIONALIZE_BASE_URL }}
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          PROFESSIONALIZE_TRANSLATION_MODEL: recommended
        run: |
          set -euo pipefail
          GLOSSARY_ARG=""
          [ -f hugo_content/.sitepilot/glossary.json ] && GLOSSARY_ARG="--glossary hugo_content/.sitepilot/glossary.json"
          MINIMAL=""
          [ "${{ inputs.fill_untranslated_only }}" = "true" ] && MINIMAL="--fill-untranslated-only"
          PERSIST=""
          [ "$MODE" = "live" ] && PERSIST="--persist-tm"
          CHANGED_ARG=""
          if [ "${{ inputs.changed_only }}" = "true" ]; then
            # Ongoing post-merge: translate only the English pages that changed, in FULL
            # mode (not minimal-churn) so English edits propagate to locales.
            if [ -n "${{ inputs.changed_pages }}" ]; then
              # Explicit page list -- recovers a commit that concurrency-coalescing cancelled
              # (its pages are no longer in HEAD~1..HEAD). Accept comma- or newline-separated.
              printf '%s\n' "${{ inputs.changed_pages }}" | tr ',' '\n' \
                | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | grep '\.md$' > "${RUNNER_TEMP}/changed.txt" || true
              echo "Explicit changed English pages:"; cat "${RUNNER_TEMP}/changed.txt" || true
            else
              # Range mode: diff BASE..HEAD. An explicit changed_base wins; otherwise default
              # to the last-translated marker tag (coalescing-proof: it only advances on a
              # successful full-range translate, so a cancelled run's pages are still ahead of
              # it and get picked up here). Fall back to HEAD~1 when no marker exists (first run).
              BASE="${{ inputs.changed_base }}"
              if [ -z "$BASE" ]; then
                git -C hugo_content fetch --quiet origin "+refs/tags/${MARKER}:refs/tags/${MARKER}" 2>/dev/null || true
                if git -C hugo_content rev-parse -q --verify "refs/tags/${MARKER}^{commit}" >/dev/null 2>&1; then
                  BASE="$(git -C hugo_content rev-parse "refs/tags/${MARKER}^{commit}")"
                  echo "Using last-translated marker ${MARKER} -> ${BASE}"
                else
                  BASE="HEAD~1"; echo "No marker ${MARKER} yet; falling back to HEAD~1"
                fi
              fi
              git -C hugo_content diff --name-only "$BASE" HEAD -- "content/${WEBSITE}/en" | grep '\.md$' > "${RUNNER_TEMP}/changed.txt" || true
              echo "Changed English pages (${BASE}..HEAD):"; cat "${RUNNER_TEMP}/changed.txt" || true
            fi
            if [ ! -s "${RUNNER_TEMP}/changed.txt" ]; then
              echo "No changed English pages to translate; nothing to do."; exit 0
            fi
            CHANGED_ARG="--changed-files @${RUNNER_TEMP}/changed.txt"
            MINIMAL=""  # full mode for changed pages
          fi
          python -m sitepilot translate \
            --content-repo-path hugo_content \
            --en-subpath "content/${WEBSITE}/en" \
            --tm-dir "website_manager/websiteManager/translations/${WEBSITE}" \
            --website "${WEBSITE}" \
            --languages "${LANGS}" \
            --exclude-languages "${DISABLED_LOCALES}" \
            --fill-misses --write $MINIMAL $PERSIST $CHANGED_ARG $GLOSSARY_ARG

      - name: Translate theme i18n (when requested)
        if: ${{ inputs.translate_i18n }}
        shell: bash
        env:
          PROFESSIONALIZE_BASE_URL: ${{ secrets.PROFESSIONALIZE_BASE_URL }}
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          PROFESSIONALIZE_TRANSLATION_MODEL: recommended
        run: |
          set -euo pipefail
          PERSIST=""
          [ "$MODE" = "live" ] && PERSIST="--persist-tm"
          python -m sitepilot translate-i18n \
            --i18n-dir hugo_content/themes/docs-theme/i18n \
            --tm-dir "website_manager/websiteManager/translations/${WEBSITE}" \
            --website "${WEBSITE}" \
            --languages "${LANGS}" \
            --exclude-languages "${DISABLED_LOCALES}" \
            --fill-misses $PERSIST

      # ---- review mode: open a PR with the locale changes, no deploy ----
      - name: Open review PR (review mode)
        if: ${{ inputs.mode == 'review' }}
        working-directory: hugo_content
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="sitepilot/translate-${SITE}-${LANGS//,/_}-${{ github.run_number }}"
          git checkout -b "$BRANCH"
          # Standard rule: changed markdown -> lastmod = change date (stamp before staging).
          python3 ../sitepilot/scripts/stamp_lastmod.py .
          git add "content/${WEBSITE}"
          [ "${{ inputs.translate_i18n }}" = "true" ] && git add themes/docs-theme/i18n || true
          if git diff --cached --quiet; then
            echo "No locale changes to review."; exit 0
          fi
          git commit -m "SitePilot translate ${WEBSITE} [${LANGS}] (review) ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
          git push origin "$BRANCH"
          gh pr create --repo familiarizeptyltd/familiarize.com --base main --head "$BRANCH" \
            --title "SitePilot translation review: ${WEBSITE} [${LANGS}]" \
            --body "First SitePilot-owned translation run (mode=review, minimal churn=${{ inputs.fill_untranslated_only }}, excluding: ${DISABLED_LOCALES:-none}). Review the locale changes; merge to accept, then run a live deploy. No deploy was triggered by this run."

      # ---- live mode: commit to main, persist TM (deploy runs in its own job) ----
      - name: Commit TM + content (live mode)
        id: commit
        if: ${{ inputs.mode == 'live' }}
        shell: bash
        env:
          GITHUB_PAT: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY=false
          cd website_manager
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "websiteManager/translations/${WEBSITE}"
          if git diff --cached --quiet; then
            echo "No TM changes."
          else
            git commit -m "SitePilot: update ${WEBSITE} TM ($(date -u +'%FT%TZ'))"
            # Concurrent-safe push: rebase on latest master and retry, so a parallel
            # TM writer (locale-optimize) is never clobbered (replaces pull --strategy=ours).
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:master; then echo "TM pushed (attempt $attempt)"; break; fi
              echo "TM push rejected; rebasing on origin/master (attempt $attempt)"
              git fetch origin master
              git rebase origin/master || { echo "rebase conflict; union-merge"; git rebase --abort || true; git merge --no-edit origin/master || true; }
              [ "$attempt" = 5 ] && { echo "TM push failed after retries"; exit 1; }
              sleep $((attempt * 3))
            done
          fi
          cd ../hugo_content
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Standard rule: changed markdown -> lastmod = change date (stamp before staging).
          python3 ../sitepilot/scripts/stamp_lastmod.py .
          git add "content/${WEBSITE}"
          [ "${{ inputs.translate_i18n }}" = "true" ] && git add themes/docs-theme/i18n || true
          if ! git diff --cached --quiet; then
            git commit -m "SitePilot: translate ${WEBSITE} [${LANGS}] ($(date -u +'%FT%TZ'))"
            # Concurrent-safe push: rebase on latest main + retry so a parallel content
            # writer (content-cron auto-merge) is never clobbered (replaces pull --strategy=ours).
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then echo "content pushed (attempt $attempt)"; break; fi
              echo "content push rejected; rebasing on origin/main (attempt $attempt)"
              git fetch origin main
              git rebase origin/main || { echo "rebase conflict; union-merge"; git rebase --abort || true; git merge --no-edit origin/main || true; }
              [ "$attempt" = 5 ] && { echo "content push failed after retries"; exit 1; }
              sleep $((attempt * 3))
            done
            DEPLOY=true
            # Advance the last-translated marker to the just-pushed HEAD -- ONLY for the default
            # coalescing-proof range (changed_only, no explicit changed_base/changed_pages). A
            # manual subset run (e.g. changed_pages recovery) must NOT advance it, or pages
            # between the old marker and HEAD that it didn't translate would be skipped forever.
            if [ "${{ inputs.changed_only }}" = "true" ] && [ -z "${{ inputs.changed_base }}" ] && [ -z "${{ inputs.changed_pages }}" ]; then
              git tag -f "${MARKER}" HEAD
              if git push -f origin "refs/tags/${MARKER}"; then
                echo "advanced marker ${MARKER} -> $(git rev-parse --short HEAD)"
              else
                echo "warning: marker ${MARKER} push failed (non-fatal; next run falls back to HEAD~1 range)"
              fi
            else
              echo "manual/override run -> marker ${MARKER} left unchanged"
            fi
          fi
          echo "deploy_needed=${DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "deploy_needed=${DEPLOY}"

  # Deploy runs as its own job with an independent (longer) timeout so a slow
  # build can never outlive the watcher — the failure mode that made the old
  # inline deploy (inside the 180-min translate job) lose track of the run.
  deploy:
    name: Deploy ${{ inputs.site }}
    needs: translate
    if: ${{ inputs.mode == 'live' && needs.translate.outputs.deploy_needed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: ${{ inputs.environment }}

    env:
      SITE: ${{ inputs.site }}
      WEBSITE: ${{ inputs.site }}.familiarize.com

    concurrency:
      group: sitepilot-deploy-${{ inputs.environment }}-${{ inputs.site }}
      cancel-in-progress: false

    steps:
      - name: Checkout SitePilot
        uses: actions/checkout@v4
        with:
          repository: familiarizeptyltd/SitePilot
          token: ${{ secrets.REPO_TOKEN }}
          ref: main
          path: sitepilot

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SitePilot
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ./sitepilot

      - name: Reliable deploy (state-based watch, retry, verify, escalate)
        shell: bash
        working-directory: sitepilot
        env:
          GITHUB_PAT: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          python -m sitepilot deploy \
            --site "${SITE}" \
            --environment "${{ inputs.environment }}" \
            --max-retries 2 \
            --build-soft-deadline-minutes 60 \
            --max-speculative-retries 3 \
            --verify-url "https://${WEBSITE}/" \
            --escalate-repo familiarizeptyltd/familiarize.com-workflows
