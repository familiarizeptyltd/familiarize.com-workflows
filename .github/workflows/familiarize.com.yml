name: familiarize.com Deployment
run-name: >-
  Deploy ${{ inputs.site == 'www'
    && 'www.familiarize.com'
    || format('{0}.familiarize.com', inputs.site) }}
  to ${{ inputs.environment }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: environment
        default: production
        required: true
      site:
        description: "Which section to deploy"
        type: choice
        options: [www, docs, about]
        default: www
        required: true

jobs:
  deploy:
    name: Build and Deploy
    environment: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      SITE: ${{ github.event.inputs.site }}

    concurrency:
      group: deploy-${{ github.event.inputs.environment }}-${{ github.event.inputs.site }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.123.8"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python (docs only)
        if: env.SITE == 'docs'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostCSS toolchain (fallback)
        shell: bash
        run: |
          set -euo pipefail
          npm i -g postcss postcss-cli autoprefixer
          npx postcss --version || true

      - name: Generate llms files (docs only)
        if: env.SITE == 'docs'
        shell: bash
        env:
          BASE_URL: "https://docs.familiarize.com"
          MAX_LINKS: "300"
          FULL_MAX_LINKS: "5000"
          MAX_PER_SECTION: "80"
          VALIDATE_HTTP: "0"
          ALLOW_EXTERNAL: "0"
          STRICT_URL: "0"
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml
          python scripts/generate_llms.py

      - name: Remove docs llms artifacts (non-docs sites)
        if: env.SITE != 'docs'
        shell: bash
        run: |
          set -euo pipefail
          rm -f static/llms.txt static/llms-full.txt static/llms-check.json static/llms-broken.txt

      - name: Compute deploy target from inputs
        id: target
        shell: bash
        run: |
          set -euo pipefail

          case "$SITE" in
            www)
              CONFIG="configs/www.familiarize.com.toml"
              BUCKET="www-familiarize-com"
              BASE_URL="https://www.familiarize.com"
              ;;
            docs)
              CONFIG="configs/docs.familiarize.com.toml"
              BUCKET="docs-familiarize-com"
              BASE_URL="https://docs.familiarize.com"
              ;;
            about)
              CONFIG="configs/about.familiarize.com.toml"
              BUCKET="about-familiarize-com"
              BASE_URL="https://about.familiarize.com"
              ;;
            *) echo "Unsupported site: $SITE"; exit 1 ;;
          esac

          COMMON="configs/common.familiarize.com.toml"

          [[ -f "$CONFIG" ]] || { echo "Missing config: $CONFIG"; exit 1; }
          [[ -f "$COMMON" ]] || { echo "Missing config: $COMMON"; exit 1; }

          echo "config=$CONFIG"     >> "$GITHUB_OUTPUT"
          echo "common=$COMMON"     >> "$GITHUB_OUTPUT"
          echo "bucket=$BUCKET"     >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

          echo "Site: $SITE"
          echo "Config: $CONFIG,$COMMON"
          echo "Bucket: $BUCKET"
          echo "Base URL: $BASE_URL"

      - name: Build site
        env:
          HUGO_POSTCSS_EXECUTABLE: npx
        run: >
          hugo
          --config "${{ steps.target.outputs.config }},${{ steps.target.outputs.common }}"
          -b "${{ steps.target.outputs.base_url }}"
          --cleanDestinationDir
          --minify
          --gc
          --enableGitInfo
          --templateMetrics
          --templateMetricsHints

      - name: Setup AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y awscli
          fi
          aws --version

      - name: Sync website to Ceph S3
        env:
          AWS_ENDPOINT_URL: ${{ vars.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_S3_FORCE_PATH_STYLE: "true"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          SRC="public"
          DEST="s3://${{ steps.target.outputs.bucket }}"

          test -d "$SRC" || { echo "Missing build output: $SRC"; exit 1; }

          echo "Syncing: $SRC -> $DEST"
          aws s3 sync "$SRC" "$DEST" \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --only-show-errors \
            --delete

      - name: Purge Bunny CDN cache
        if: success()
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BASE_URL: ${{ steps.target.outputs.base_url }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${BASE_URL%/}/*"
          echo "Purging Bunny CDN for: $TARGET"
          curl -sS -G \
            -H "X-Api-Key: ${BUNNY_API_KEY}" \
            --data-urlencode "url=${TARGET}" \
            "https://api.dynabic.com/bn/purge?async=true" \
            -D - | sed -n '1,60p'
